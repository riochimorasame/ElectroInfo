<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Expert Double Volet | Electro-Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        #live-preview { white-space: pre-wrap; word-wrap: break-word; }
        .alert-danger { background: #fee2e2; border-left: 6px solid #ef4444; padding: 1rem; color: #991b1b; font-weight: bold; margin: 1rem 0; }
    </style>
</head>
<body class="bg-slate-100 p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h1 class="text-2xl font-black italic uppercase">Console <span class="text-blue-600">Monsieur Djone</span></h1>
            
            <div class="flex bg-white rounded-2xl p-1.5 shadow-inner border border-slate-200">
                <button onclick="switchTab('article')" id="tab-article" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all tab-active">
                    <i class="fas fa-newspaper mr-2"></i> Articles Blog
                </button>
                <button onclick="switchTab('cours')" id="tab-cours" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400">
                    <i class="fas fa-file-code mr-2"></i> Cours (PDF/HTML)
                </button>
            </div>
        </header>

        <div class="grid lg:grid-cols-2 gap-10">
            <form id="articleForm" class="bg-white p-8 rounded-[3rem] shadow-2xl space-y-5">
                <input type="hidden" id="postType" value="article">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="title" placeholder="Titre de la ressource" class="p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-500" required>
                    <input type="text" id="category" placeholder="Rayon (ex: Normes)" class="p-4 bg-slate-50 border rounded-2xl outline-none">
                </div>

                <div id="section-cours-only" class="hidden space-y-2 bg-blue-50 p-6 rounded-3xl border-2 border-dashed border-blue-200">
                    <label class="text-[10px] font-black text-blue-600 uppercase italic">Chemin du fichier (Hébergé dans /cours/)</label>
                    <input type="text" id="fileLink" placeholder="ex: cours/schema-va-et-vient.pdf" class="w-full p-4 bg-white border rounded-xl font-mono text-sm outline-none">
                </div>

                <div id="section-article-only" class="space-y-4">
                    <div class="flex flex-wrap gap-2 bg-slate-900 p-3 rounded-2xl">
                        <button type="button" onclick="tag('h2')" class="bg-slate-700 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-slate-600">TITRE H2</button>
                        <button type="button" onclick="media('image')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">IMAGE</button>
                        <button type="button" onclick="media('video')" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">YOUTUBE</button>
                        <button type="button" onclick="tag('danger')" class="bg-orange-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">DANGER</button>
                    </div>
                    <textarea id="fullContentHTML" placeholder="Rédigez ici (Espaces respectés)..." class="w-full h-80 p-6 bg-slate-50 border rounded-2xl font-mono text-sm outline-none" oninput="updatePreview()"></textarea>
                </div>

                <input type="text" id="mainImage" placeholder="Lien image couverture" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black uppercase shadow-xl hover:bg-blue-700 transition">Publier la ressource</button>
            </form>

            <div class="bg-white p-10 rounded-[3rem] shadow-inner border border-slate-200 overflow-y-auto max-h-[850px]">
                <p class="text-[10px] font-black text-slate-400 mb-8 uppercase tracking-[0.2em]">Aperçu du rendu final</p>
                <div id="live-preview" class="article-body"></div>
            </div>
        </div>
        <div id="articlesAdminList" class="mt-20 grid md:grid-cols-3 gap-6"></div>
    </div>

    <script type="module" src="src/admin.js"></script>
    <script>
        function switchTab(type) {
            document.getElementById('postType').value = type;
            const isCours = type === 'cours';
            document.getElementById('tab-article').className = isCours ? 'px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400' : 'px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all tab-active';
            document.getElementById('tab-cours').className = isCours ? 'px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all tab-active' : 'px-8 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400';
            document.getElementById('section-cours-only').classList.toggle('hidden', !isCours);
            document.getElementById('section-article-only').classList.toggle('hidden', isCours);
            updatePreview();
        }
        const area = document.getElementById('fullContentHTML');
        function tag(t) {
            const list = { 'h2':'\n<h2>Titre du Chapitre</h2>\n', 'danger':'\n<div class="alert-danger">⚠️ AVERTISSEMENT TECHNIQUE</div>\n' };
            area.setRangeText(list[t], area.selectionStart, area.selectionEnd, 'end'); updatePreview();
        }
        function media(t) {
            const url = prompt("Lien :"); if(!url) return;
            const code = t === 'image' ? `\n<img src="${url}" class="w-full rounded-3xl my-8 shadow-lg">\n` : `\n<div class="aspect-video rounded-3xl overflow-hidden my-8 shadow-2xl"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${url.split('v=')[1] || url.split('/').pop()}" frameborder="0"></iframe></div>\n`;
            area.setRangeText(code, area.selectionStart, area.selectionEnd, 'end'); updatePreview();
        }
        function updatePreview() {
            const title = document.getElementById('title').value;
            const type = document.getElementById('postType').value;
            const content = type === 'cours' ? `<div class="p-10 border-4 border-dashed border-blue-200 rounded-3xl text-center font-bold text-blue-600 italic">📂 Fichier lié : ${document.getElementById('fileLink').value}</div>` : area.value;
            document.getElementById('live-preview').innerHTML = `<h1 class="text-4xl font-black mb-6">${title}</h1>` + content;
        }
    </script>
</body>
</html>
