<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cours | Electro-Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        /* CORRECTION ESPACES ET RETOURS */
        .article-body { white-space: pre-wrap; word-wrap: break-word; color: #334155; font-size: 1.1rem; line-height: 1.8; }
        .article-body h2 { font-size: 2rem; font-weight: 900; margin: 3rem 0 1rem; border-left: 6px solid #2563eb; padding-left: 1rem; white-space: normal; }
        .alert-danger { background: #fee2e2; border-left: 8px solid #ef4444; padding: 2rem; border-radius: 1.5rem; color: #991b1b; font-weight: 800; margin: 2rem 0; white-space: normal; }
    </style>
</head>
<body class="bg-slate-50">
    <header class="bg-white border-b h-16 flex items-center justify-between px-8 sticky top-0 z-50">
        <a href="index.html" class="font-black text-blue-600 italic uppercase">ELECTRO TECH ACADEMY</a>
        <button onclick="window.print()" class="text-xs font-bold uppercase p-2 border rounded-lg hover:bg-black hover:text-white transition">Imprimer</button>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-4 gap-12">
        <aside class="hidden lg:block">
            <div class="sticky top-24 bg-white p-6 rounded-[2rem] shadow-sm border">
                <p class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Sommaire</p>
                <div id="course-toc" class="space-y-3 text-sm font-bold text-slate-500"></div>
            </div>
        </aside>
        <main class="lg:col-span-3 bg-white p-8 md:p-16 rounded-[3rem] shadow-sm" id="article-viewer"></main>
    </div>
    <script type="module" src="src/article-single.js"></script>
</body>
</html>
