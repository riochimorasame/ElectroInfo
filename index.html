<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro-Tech | Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #side-menu { transition: transform 0.4s ease; transform: translateX(-100%); }
        #side-menu.open { transform: translateX(0); }
        #slider-track { transition: transform 0.8s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="overlay" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm" onclick="toggleMenu()"></div>
    <aside id="side-menu" class="fixed top-0 left-0 h-full w-80 bg-white shadow-2xl z-50 p-8 flex flex-col">
        <h2 class="text-2xl font-black text-blue-600 mb-8 uppercase italic">Menu</h2>
        <nav class="space-y-3 flex-grow">
            <a href="cours.html" class="flex items-center gap-3 w-full p-4 rounded-2xl font-black bg-blue-600 text-white shadow-lg">
                <i class="fas fa-graduation-cap"></i> ACCÉDER AUX COURS
            </a>
            <div id="nav-cats" class="space-y-1 mt-6"></div>
        </nav>
        <a href="admin.html" class="p-4 bg-slate-100 text-slate-500 font-bold rounded-xl text-center">ADMINISTRATION</a>
    </aside>

    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-30 px-6 h-20 flex items-center justify-between">
        <div class="flex items-center">
            <button onclick="toggleMenu()" class="mr-6 p-3 bg-slate-100 rounded-2xl hover:bg-blue-600 hover:text-white transition"><i class="fas fa-bars-staggered"></i></button>
            <div class="text-2xl font-black text-blue-600 uppercase italic">ELECTRO TECH</div>
        </div>
        <div class="bg-slate-100 rounded-2xl px-5 py-3 flex items-center w-full max-w-md border">
            <i class="fas fa-search text-slate-400 mr-3"></i>
            <input type="text" id="searchInput" placeholder="Rechercher..." class="bg-transparent outline-none w-full">
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 mt-8">
        <div class="relative overflow-hidden rounded-[3rem] bg-slate-900 h-64 md:h-[450px] shadow-2xl border-8 border-white">
            <div id="slider-track" class="flex h-full"></div>
            <div id="slider-dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3"></div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module" src="src/scripte.js"></script>
    <script>function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }</script>
</body>
</html>
